<!DOCTYPE html>
<html>
<head>
    <title>Môj nový JS</title>
</head>
<body>

    <h1 id="nadpis">Ahoj svet</h1>
    <button onclick="zmenText()">Klikni na mňa</button>

    <script>
        function zmenText() {
            document.getElementById("nadpis").innerText = "Práve si zmenil text 🎉";
        }
        zmenText();
        alert ( ‘ Ahoj ‘ ) ;
        alert ( ‘ Akadémia ‘ ) ;
    </script>

</body>
</html>
