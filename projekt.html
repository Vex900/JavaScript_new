<!DOCTYPE html>
<html>
<head>
    <title>pexeso</title>
    <style>
    .cardDiv {
      border: 5px outset red;
      background-color: lightblue;    
      text-align: center;
      width: 100px;
      height: 100px;
      margin: 10px;
    }

    .columnDiv {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      justify-items: center;
    }
    </style>
</head>
<body>

<div class="columnDiv">
  <div class="cardDiv"></div>
  <div class="cardDiv"></div>
  <div class="cardDiv"></div>
  <div class="cardDiv"></div>
  <div class="cardDiv"></div>
</div>

</body>
</html>
