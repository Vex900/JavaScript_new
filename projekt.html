<!DOCTYPE html>
<html>
<head>
    <title>pexeso</title>
    <style>
      .columnDiv {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        justify-items: center;
      }

      /* všetky karty rovnaké */
      [class^="cardDiv"] {
        border: 5px outset red;
        background-color: lightblue;    
        text-align: center;
        width: 100px;
        height: 100px;
        margin: 10px;
        cursor: pointer;
      }

      .active {
        background-color: yellow;
      }

      .matched {
        background-color: lightgreen;
      }

      /* čísla skryté */
      [class^="cardDiv"] h1 {
        visibility: hidden;
      }

      .active h1,
      .matched h1 {
        visibility: visible;
      }
    </style>
</head>
<body>

<div class="columnDiv">
  <div class="cardDiv1" onclick="klik(this)"><h1>1</h1></div>
  <div class="cardDiv2" onclick="klik(this)"><h1>2</h1></div>
  <div class="cardDiv3" onclick="klik(this)"><h1>3</h1></div>
  <div class="cardDiv4" onclick="klik(this)"><h1>4</h1></div>
  <div class="cardDiv5" onclick="klik(this)"><h1>5</h1></div>
  <div class="cardDiv6" onclick="klik(this)"><h1>6</h1></div>
  <div class="cardDiv7" onclick="klik(this)"><h1>7</h1></div>
  <div class="cardDiv8" onclick="klik(this)"><h1>8</h1></div>
  <div class="cardDiv9" onclick="klik(this)"><h1>9</h1></div>
  <div class="cardDiv10" onclick="klik(this)"><h1>10</h1></div>

  <div class="cardDiv11" onclick="klik(this)"><h1>1</h1></div>
  <div class="cardDiv12" onclick="klik(this)"><h1>2</h1></div>
  <div class="cardDiv13" onclick="klik(this)"><h1>3</h1></div>
  <div class="cardDiv14" onclick="klik(this)"><h1>4</h1></div>
  <div class="cardDiv15" onclick="klik(this)"><h1>5</h1></div>
  <div class="cardDiv16" onclick="klik(this)"><h1>6</h1></div>
  <div class="cardDiv17" onclick="klik(this)"><h1>7</h1></div>
  <div class="cardDiv18" onclick="klik(this)"><h1>8</h1></div>
  <div class="cardDiv19" onclick="klik(this)"><h1>9</h1></div>
  <div class="cardDiv20" onclick="klik(this)"><h1>10</h1></div>
</div>

<script>
let otvorene = [];
let lock = false;

function klik(element) {
  if (lock) return;
  if (element.classList.contains("active") || element.classList.contains("matched")) return;

  element.classList.add("active");
  otvorene.push(element);

  if (otvorene.length === 2) {
    lock = true;

    let val1 = otvorene[0].innerText;
    let val2 = otvorene[1].innerText;

    if (val1 === val2) {
      // ✅ zhoda
      otvorene[0].classList.remove("active");
      otvorene[1].classList.remove("active");

      otvorene[0].classList.add("matched");
      otvorene[1].classList.add("matched");

      otvorene = [];
      lock = false;
    } else {
      // ❌ nezhoda
      setTimeout(() => {
        otvorene[0].classList.remove("active");
        otvorene[1].classList.remove("active");

        otvorene = [];
        lock = false;
      }, 2000);
    }
  }
}
</script>

</body>
</html>
