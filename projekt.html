<script>
let otvorene = [];
let lock = false;

function klik(element) {
  if (lock) return;
  if (element.classList.contains("active")) return;

  element.classList.add("active");
  otvorene.push(element);

  if (otvorene.length === 2) {
    lock = true;

    setTimeout(() => {
      otvorene[0].classList.remove("active");
      otvorene[1].classList.remove("active");

      otvorene = [];
      lock = false;
    }, 2000);
  }
}
</script>
